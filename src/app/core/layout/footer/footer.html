<footer class="footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <img class="footer-logo" src="logo.png" />
      <p class="footer-tagline">Crafted with Intention,<br />Worn with Confidence</p>
    </div>

    <div class="footer-col">
      <h4 class="footer-col-title">Shop</h4>
      <ul class="footer-links">
        <li>
          <a routerLink="/shop" [queryParams]="{ category: 'women\'s clothing' }"
            >Women's clothing</a
          >
        </li>
        <li>
          <a routerLink="/shop" [queryParams]="{ category: 'men\'s clothing' }">Men's clothing</a>
        </li>
        <li><a routerLink="/shop" [queryParams]="{ category: 'jewelery' }">Jewelery</a></li>
        <li><a routerLink="/shop" [queryParams]="{ category: 'electronics' }">Electronics</a></li>
      </ul>
    </div>

    <div class="footer-col">
      <h4 class="footer-col-title">Useful Links</h4>
      <ul class="footer-links">
        <li><a routerLink="/contact">Contact Us</a></li>
        <li><a href="/about">About Us</a></li>
      </ul>
    </div>

    <div class="footer-col">
      <h4 class="footer-col-title">Connect</h4>
      <div class="footer-socials">
        <a href="#" aria-label="Facebook">
          <img src="svg_icons/socials/facebook.svg" alt="Facebook" />
        </a>
        <a href="#" aria-label="Instagram">
          <img src="svg_icons/socials/instagram.svg" alt="Instagram" />
        </a>
        <a href="#" aria-label="Twitter">
          <img src="svg_icons/socials/twitter.svg" alt="Twitter" />
        </a>
        <a href="#" aria-label="Email">
          <img src="svg_icons/mail.svg" alt="Mail" />
        </a>
      </div>
    </div>
  </div>

  <div class="footer-bottom">
    <p>&copy; 2026 Logo. All rights reserved.</p>
  </div>
</footer>
